controller_manager:
  ros__parameters:
    # Control loop rate. Keep in mind: the INNFOS SDK's switchAutoRefresh()
    # defaults to a 1-second refresh interval (setAutoRefreshInterval() is
    # needed to bring it down to match this rate - see note below).
    update_rate: 100  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

joint_state_broadcaster:
  ros__parameters:
    joints:
      - axis_joint_1
      - axis_joint_2
      - axis_joint_3
      - axis_joint_4
      - axis_joint_5
      - axis_joint_6

joint_trajectory_controller:
  ros__parameters:
    joints:
      - axis_joint_1
      - axis_joint_2
      - axis_joint_3
      - axis_joint_4
      - axis_joint_5
      - axis_joint_6

    command_interfaces:
      - position

    state_interfaces:
      - position
      - velocity

    allow_partial_joints_goal: false
    open_loop_control: false
    allow_integration_in_goal_trajectories: true

    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 0.0
      axis_joint_1: { trajectory: 0.05, goal: 0.02 }
      axis_joint_2: { trajectory: 0.05, goal: 0.02 }
      axis_joint_3: { trajectory: 0.05, goal: 0.02 }
      axis_joint_4: { trajectory: 0.05, goal: 0.02 }
      axis_joint_5: { trajectory: 0.05, goal: 0.02 }
      axis_joint_6: { trajectory: 0.05, goal: 0.02 }